name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP (upload only, never deletes server files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER_WEB }}
          username: ${{ secrets.FTP_USERNAME_WEB }}
          password: ${{ secrets.FTP_PASSWORD_WEB }}
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            **/node_modules/**
            **/.DS_Store
            **/.gitignore
            **/config.php
            **/test-smtp.php
            **/test-debug.php
            **/contact.log
            **/.ftp-deploy-sync-state.json
